<!DOCTYPE html>
<html>
<head>
    <title>AI Image Generator</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 50px;
        }

        input {
            padding: 10px;
            width: 400px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
        }

        .nav a {
            color: #38bdf8;
            margin: 10px;
            text-decoration: none;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .loading {
            color: yellow;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/">Generator</a>
    <a href="/chat">Chat</a>
    <a href="/logout">Logout</a>
</div>

<div class="container">

    <h2>🎨 AI Image Generator</h2>

    <form method="post" onsubmit="showLoading()">
        <input name="prompt" placeholder="Describe your image..." required>
        <br><br>
        <button type="submit">Generate</button>
    </form>

    <p id="loading" class="loading" style="display:none;">⏳ Generating image...</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if image_url %}
        <h3>Result:</h3>
        <img src="{{ image_url }}" width="400"><br><br>
        <a href="{{ image_url }}" download>
            <button>Download Image</button>
        </a>
    {% endif %}

</div>

<script>
function showLoading() {
    document.getElementById("loading").style.display = "block";
}
</script>

</body>
</html>
